services:
  rvu_shadow_postgres:
    image: postgres:16
    container_name: rvu_shadow_postgres
    restart: unless-stopped
    env_file:
      - ../.env.shadow-db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - rvu_shadow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  rvu_shadow_pgdata:
