# RVU — rvu.midfloridasurgical.com → 127.0.0.1:3010 (Docker rvu_api or uvicorn)
#
# Same public IP as Cal + Atlas (e.g. 50.192.210.75): nginx uses SNI; you MUST have this
# server{} + a cert for rvu. Otherwise requests fall through to default_server (Atlas) and
# browsers show a certificate error. See deploy/SHARED_WAN_AND_NGINX.md
#
# Setup:
# 1) Issue cert: sudo certbot certonly --nginx -d rvu.midfloridasurgical.com  (or webroot)
# 2) sudo cp deploy/nginx-rvu.conf /etc/nginx/sites-available/rvu
# 3) sudo ln -sf /etc/nginx/sites-available/rvu /etc/nginx/sites-enabled/rvu
# 4) sudo nginx -t && sudo systemctl reload nginx
#
# Alternative: paste these two server blocks into the combined sites file on the Atlas host
# (same pattern as referral.* in sss/llm-gateway-updated.conf).

# Port-80 is handled by /etc/nginx/sites-enabled/rvu-acme (ACME challenge passthrough + redirect)
# That file is created once by deploy/bootstrap-rvu-cert.sh and stays for auto-renewal.

server {
    listen 443 ssl http2;
    server_name rvu.midfloridasurgical.com;

    ssl_certificate     /etc/letsencrypt/live/rvu.midfloridasurgical.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rvu.midfloridasurgical.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Increase body size for image uploads
    client_max_body_size 32M;

    location / {
        proxy_pass http://127.0.0.1:3010/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for AI model inference
        proxy_read_timeout 300;
        proxy_send_timeout 300;

        # SSE / streaming — disable buffering
        proxy_buffering    off;
        proxy_cache        off;

        # Pass upstream cache headers through
        proxy_pass_header Cache-Control;
        proxy_pass_header Pragma;
    }
}
